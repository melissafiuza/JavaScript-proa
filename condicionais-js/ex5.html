<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 5</title>
</head>
<body>
    <script>
        let idade = parseInt(prompt("Digite sua idade: "))
        if (idade <16){
            alert("Não eleitor")
        }
        else if(idade<18){
            alert("Eleitor facultativo") 
        }
        else if(idade <65){
            alert("Eleitor obrigatório")
        }
        else{
            alert("Eleitor facultativo")
        }
    </script>
</body>
</html>
