<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 11</title>
</head>
<body>
    <script>
        let nome = prompt("Digite seu nome: ")
        let salario = parseFloat(prompt("Digite seu salário fixo: "))
        let vendas = parseInt(prompt("Digite o número total de vendas efetuadas por mês: "))
        let comissao = vendas *0.15
        total = salario + comissao 
        document. write("Olá, " + nome + " <br/>Seu salário fixo é de R$" + salario + " <br/>Seu salário final é de R$" + total)
    </script>
</body>
</html>
