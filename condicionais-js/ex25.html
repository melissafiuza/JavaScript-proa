<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 25</title>
</head>
<body>
    <script>
        let soma = 0
        let numero = 0
        while(numero >=0){
            numero = parseInt(prompt("Digite um número: "))
            if(numero >=0){
                soma=soma+numero
            }
        }
        alert("Soma total: "+soma)
    </script>
</body>
</html>
