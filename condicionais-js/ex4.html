<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 4</title>
</head>
<body>
    <script>
        let a = parseInt(prompt("Digite um número inteiro: "))
        let b = parseInt(prompt("Digite outro número inteiro: "))
        let c = parseInt(prompt("Digite mais um número inteiro: "))
        let maior
        let menor
        let meio
     //maior
        if(a>b){
            if (a>c){
                maior = a
            } else {
                maior = c
            }
        } else{
            if (b>c){
                maior =b 
            } else{ 
                maior = c}
        }

        //menor
        if(a<b){
            if(a<c){
                menor = a
            } else{
                menor = c
            }
        } else{
            if(b<c){
                menor = b
            } else {
                menor = c
            }
        } 
        meio = a+b+c-maior-menor
        alert(maior + ", " + meio + ", " + menor )
    </script>
</body>
</html>
