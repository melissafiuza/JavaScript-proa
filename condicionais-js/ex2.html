<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 2</title>
</head>
<body>
    <script>
        let n = prompt("Digite um número inteiro")
        if (n.endsWith("0")){
            alert("Divisível por 10, por 5 e por 2")
        }
        else if (n.endsWith("5")){
           alert("Divisível por 5")
    }
    else if (n.endsWith("2")){
        alert ("Divisível por 2")
    }
     else if (n.endsWith("4")){
        alert ("Divisível por 2")
    }
     else if (n.endsWith("6")){
        alert ("Divisível por 2")
    }
     else if (n.endsWith("8")){
        alert ("Divisível por 2")
    }
     else if (n.endsWith("0")){
        alert ("Divisível por 2")
    }
    else {
        alert("Não é divisível por 10, 5 ou 2")
    }
    


    </script>
</body>
</html>
